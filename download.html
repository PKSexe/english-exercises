<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 英文練習下載系統</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.container {background:white;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.15);padding:40px;max-width:500px;width:100%;}
.header {text-align:center;margin-bottom:30px;}
.header h1 {color:#1a202c;font-size:28px;margin-bottom:10px;}
.header p {color:#718096;font-size:16px;}
.form-group {margin-bottom:25px;}
label {display:block;margin-bottom:8px;color:#2d3748;font-weight:600;font-size:14px;}
select,input[type="email"] {width:100%;padding:14px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:16px;background:#f7fafc;transition:all 0.3s ease;}
select {background:url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIiIGhlaWdodD0iOCIgdmlld0JveD0iMCAwIDEyIDgiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxwYXRoIGQ9Ik0xIDFMNiA2TDExIDEiIHN0cm9rZT0iIzk4QTVDQyIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiLz4KPC9zdmc+Cg==") no-repeat;background-position:right 12px center;padding-right:40px;background-size:12px;}
select:focus,input:focus {outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.1);}
.form-row {display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.auth-box {background:#f7fafc;border:2px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:25px;}
.auth-box h3 {color:#2d3748;font-size:18px;margin-bottom:10px;}
.auth-box p {color:#718096;font-size:14px;margin-bottom:15px;}
.submit-btn {width:100%;padding:16px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;transition:all 0.3s ease;}
.submit-btn:hover:not(:disabled) {transform:translateY(-2px);box-shadow:0 10px 25px rgba(102,126,234,0.4);}
.submit-btn:disabled {opacity:0.7;cursor:not-allowed;}
.loading {display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top:2px solid white;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin {0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.response {margin-top:20px;padding:16px;border-radius:12px;text-align:center;font-weight:500;display:none;}
.response.success {background:#c6f6d5;color:#22543d;border:1px solid #9ae6b4;}
.response.error {background:#fed7d7;color:#742a2a;border:1px solid #fc8181;}
@media (max-width:600px) {.form-row {grid-template-columns:1fr;}.container {padding:30px 20px;margin:10px;}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div style="font-size:48px;margin-bottom:15px;">📚</div>
<h1>英文練習下載</h1>
<p>選擇課本資料，輸入老師認證碼，下載練習檔案</p>
</div>

<form id="exerciseForm">
<div class="form-row">
<div class="form-group">
<label>📖 出版社</label>
<select name="publisher" required>
<option value="">請選擇</option>
<option value="Oxford">Oxford</option>
<option value="Longman">Longman</option>
<option value="EPH">EPH</option>
<option value="Aristo">Aristo</option>
<option value="Ling Kee">Ling Kee</option>
</select>
</div>
<div class="form-group">
<label>📊 年級</label>
<select name="grade_level" required>
<option value="">請選擇</option>
<option value="P.1">P.1</option>
<option value="P.2">P.2</option>
<option value="P.3">P.3</option>
<option value="P.4">P.4</option>
<option value="P.5">P.5</option>
<option value="P.6">P.6</option>
</select>
</div>
</div>

<div class="form-group">
<label>📑 章數</label>
<select name="unit" required>
<option value="">請選擇</option>
<option value="Unit 1">Unit 1</option><option value="Unit 2">Unit 2</option><option value="Unit 3">Unit 3</option>
<option value="Unit 4">Unit 4</option><option value="Unit 5">Unit 5</option><option value="Unit 6">Unit 6</option>
<option value="Unit 7">Unit 7</option><option value="Unit 8">Unit 8</option><option value="Unit 9">Unit 9</option>
<option value="Unit 10">Unit 10</option><option value="Unit 11">Unit 11</option><option value="Unit 12">Unit 12</option>
<option value="Unit 13">Unit 13</option><option value="Unit 14">Unit 14</option><option value="Unit 15">Unit 15</option>
<option value="Unit 16">Unit 16</option><option value="Unit 17">Unit 17</option><option value="Unit 18">Unit 18</option>
<option value="Unit 19">Unit 19</option><option value="Unit 20">Unit 20</option>
<option value="Unit 21">Unit 21</option><option value="Unit 22">Unit 22</option><option value="Unit 23">Unit 23</option>
<option value="Unit 24">Unit 24</option><option value="Unit 25">Unit 25</option><option value="Unit 26">Unit 26</option>
<option value="Unit 27">Unit 27</option><option value="Unit 28">Unit 28</option><option value="Unit 29">Unit 29</option>
<option value="Unit 30">Unit 30</option>
</select>
</div>

<div class="form-group">
<label>📧 收件電郵</label>
<input type="email" name="email" placeholder="student@example.com" required>
</div>

<div class="auth-box">
<h3>🔐 認證碼</h3>
<p>請輸入老師提供的<strong>一次性認證碼</strong></p>
<input type="text" name="auth_code" placeholder="AUTH-202603-ABCD" required>
</div>

<button type="submit" class="submit-btn" id="submitBtn">🚀 立即下載練習</button>
</form>

<div id="response" class="response"></div>
</div>

<script>
const form=document.getElementById('exerciseForm'),submitBtn=document.getElementById('submitBtn'),responseDiv=document.getElementById('response');
const WEBHOOK_URL='https://hook.us2.make.com/v695caqqr5yenn1xpdb0bojvok2jbxmn';

form.addEventListener('submit',async e=>{
e.preventDefault();
if(!form.checkValidity()){showResponse('請填妥所有欄位','error');return;}
submitBtn.disabled=true;submitBtn.innerHTML='<span class="loading"></span>處理中...';responseDiv.style.display='none';
try{
const formData=new FormData(form);
const res=await fetch(WEBHOOK_URL,{method:'POST',body:formData});
const result=await res.text();
if(res.ok){showResponse('✅ 成功！練習檔已發送到您的電郵','success');form.reset();}
else{showResponse(result||'處理失敗，請稍後再試','error');}
}catch(e){showResponse('網路錯誤，請檢查連線','error');console.error(e);}
submitBtn.disabled=false;submitBtn.innerHTML='🚀 立即下載練習';
});

function showResponse(msg,type){
responseDiv.textContent=msg;responseDiv.className=`response ${type}`;responseDiv.style.display='block';
if(type==='error')setTimeout(()=>responseDiv.style.display='none',5000);
}
</script>
</body>
</html>
